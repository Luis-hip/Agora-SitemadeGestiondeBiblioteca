<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6">
  <div
    class="absolute inset-0 bg-stone-900/50 backdrop-blur-sm transition-opacity animate-in fade-in duration-200"
    (click)="cerrar.emit()"
  ></div>

  <div
    class="relative w-full max-w-lg bg-white rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200"
  >
    <div class="px-6 py-5 border-b border-stone-100 flex items-center justify-between bg-stone-50/50">
      <span
        class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-bold uppercase tracking-wider text-white"
        [class]="libro.disponible ? 'bg-emerald-600' : 'bg-red-600'"
      >
        {{ libro.disponible ? 'Disponible' : 'Prestado' }}
      </span>
      <button
        type="button"
        (click)="cerrar.emit()"
        class="p-2 text-stone-400 hover:text-stone-700 hover:bg-stone-100 rounded-full transition-colors"
        aria-label="Cerrar"
      >
        &times;
      </button>
    </div>

    <div class="p-6 md:p-8 flex flex-col sm:flex-row gap-6">
      <div
        class="w-28 sm:w-32 aspect-[2/3] shrink-0 rounded-xl overflow-hidden bg-stone-200 shadow-md mx-auto sm:mx-0"
      >
        <app-book-cover [isbn]="libro.isbn" [titulo]="libro.titulo" />
      </div>

      <div class="flex-1 min-w-0">
        <h3 class="text-xl font-bold text-stone-900 leading-tight mb-1">{{ libro.titulo }}</h3>
        <p class="text-stone-500 text-sm mb-4">
          {{ libro.autores.length ? libro.autores.map((a) => a.nombre).join(', ') : 'Autor desconocido' }}
        </p>

        <div class="grid grid-cols-2 gap-y-3 gap-x-4 bg-stone-50 p-4 rounded-2xl border border-stone-100 text-sm">
          <div>
            <span class="block text-[10px] font-bold text-stone-500 uppercase tracking-wider mb-1">ISBN</span>
            <span class="font-mono text-xs text-stone-900">{{ libro.isbn }}</span>
          </div>
          <div>
            <span class="block text-[10px] font-bold text-stone-500 uppercase tracking-wider mb-1">Categoria</span>
            <span class="text-stone-900">{{ libro.categoria.nombre }}</span>
          </div>
          <div>
            <span class="block text-[10px] font-bold text-stone-500 uppercase tracking-wider mb-1"
              >Publicacion</span
            >
            <span class="text-stone-900">{{ libro.fecha_publicacion }}</span>
          </div>
          <div>
            <span class="block text-[10px] font-bold text-stone-500 uppercase tracking-wider mb-1">ID</span>
            <span class="font-mono text-xs text-stone-900">{{ libro.id }}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="px-6 py-5 bg-white border-t border-stone-100 flex justify-end gap-3">
      <button
        type="button"
        (click)="cerrar.emit()"
        class="px-5 py-2.5 text-sm font-bold text-stone-600 hover:text-stone-900 hover:bg-stone-100 rounded-xl transition-colors"
      >
        Cerrar
      </button>
      <button
        type="button"
        [disabled]="!libro.disponible || enviando"
        (click)="solicitarPrestamo.emit()"
        class="px-6 py-2.5 text-sm font-bold text-white bg-amber-700 hover:bg-amber-800 disabled:bg-stone-300 disabled:cursor-not-allowed rounded-xl transition-colors shadow-md"
      >
        {{ enviando ? 'Procesando...' : 'Solicitar Prestamo' }}
      </button>
    </div>
  </div>
</div>

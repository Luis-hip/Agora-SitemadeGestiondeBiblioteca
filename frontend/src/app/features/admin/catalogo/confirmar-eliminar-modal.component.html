<div class="fixed inset-0 z-[110] flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-stone-900/50 backdrop-blur-sm transition-opacity" (click)="cerrar.emit()"></div>
  <div
    class="relative w-full max-w-sm bg-white rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200"
  >
    <div class="px-6 py-5 border-b border-stone-100 flex items-center justify-between">
      <h2 class="text-lg font-bold text-stone-900">{{ titulo }}</h2>
      <button
        type="button"
        (click)="cerrar.emit()"
        class="p-2 text-stone-400 hover:text-stone-700 hover:bg-stone-100 rounded-full transition-colors"
        aria-label="Cerrar"
      >
        &times;
      </button>
    </div>
    <div class="p-6">
      <p class="text-stone-600 text-sm">{{ mensaje }}</p>
    </div>
    <div class="px-6 py-5 bg-stone-50 border-t border-stone-100 flex justify-end gap-3">
      <button
        type="button"
        (click)="cerrar.emit()"
        class="px-5 py-2.5 text-sm font-bold text-stone-600 hover:bg-stone-100 rounded-xl transition-colors"
      >
        Cancelar
      </button>
      <button
        type="button"
        [disabled]="eliminando"
        (click)="confirmar.emit()"
        class="px-6 py-2.5 text-sm font-bold text-white bg-red-600 hover:bg-red-700 disabled:bg-stone-300 rounded-xl transition-colors shadow-md"
      >
        {{ eliminando ? 'Eliminando...' : 'Eliminar' }}
      </button>
    </div>
  </div>
</div>

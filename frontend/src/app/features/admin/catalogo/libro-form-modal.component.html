<div class="fixed inset-0 z-[110] flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-stone-900/40 backdrop-blur-sm transition-opacity" (click)="cerrar.emit()"></div>

  <div
    class="relative w-full max-w-xl bg-white rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200 flex flex-col max-h-[90vh]"
  >
    <div class="px-8 py-6 border-b border-stone-100 flex items-center justify-between shrink-0">
      <h2 class="text-xl font-bold text-stone-900">{{ libro ? 'Modificar Libro' : 'Agregar nuevo libro' }}</h2>
      <button
        type="button"
        (click)="cerrar.emit()"
        class="p-2 text-stone-400 hover:text-stone-700 hover:bg-stone-100 rounded-full transition-colors"
        aria-label="Cerrar"
      >
        &times;
      </button>
    </div>

    <form (submit)="alEnviarFormulario($event)" class="p-8 overflow-y-auto flex-1 bg-stone-50/30">
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-bold text-stone-700 mb-2">Titulo del Libro</label>
          <input
            required
            type="text"
            [value]="titulo()"
            (input)="titulo.set($any($event.target).value)"
            class="w-full px-4 py-3 bg-white border border-stone-200 rounded-xl focus:outline-none focus-visible:ring-2 focus-visible:ring-amber-500/40 focus:border-amber-500 shadow-sm transition-all"
            placeholder="Ej. Cien anos de soledad"
          />
        </div>

        <div class="grid grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-bold text-stone-700 mb-2">ISBN</label>
            <input
              required
              type="text"
              [value]="isbn()"
              (input)="isbn.set($any($event.target).value)"
              class="w-full px-4 py-3 bg-white border border-stone-200 rounded-xl focus:outline-none focus-visible:ring-2 focus-visible:ring-amber-500/40 focus:border-amber-500 shadow-sm transition-all font-mono text-sm"
              placeholder="978-..."
            />
          </div>
          <div>
            <label class="block text-sm font-bold text-stone-700 mb-2">Fecha de publicacion</label>
            <input
              required
              type="date"
              [value]="fechaPublicacion()"
              (input)="fechaPublicacion.set($any($event.target).value)"
              class="w-full px-4 py-3 bg-white border border-stone-200 rounded-xl focus:outline-none focus-visible:ring-2 focus-visible:ring-amber-500/40 focus:border-amber-500 shadow-sm transition-all"
            />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-bold text-stone-700 mb-2">Autor existente</label>
            <select
              [value]="autorSeleccionadoId()"
              (change)="autorSeleccionadoId.set($any($event.target).value ? +$any($event.target).value : null)"
              class="w-full px-4 py-3 bg-white border border-stone-200 rounded-xl focus:outline-none focus-visible:ring-2 focus-visible:ring-amber-500/40 focus:border-amber-500 shadow-sm transition-all text-stone-700"
            >
              <option value="">Seleccionar...</option>
              @for (autor of autores; track autor.id) {
                <option [value]="autor.id">{{ autor.nombre }}</option>
              }
            </select>
          </div>
          <div>
            <label class="block text-sm font-bold text-stone-700 mb-2">O nuevo autor</label>
            <input
              type="text"
              [value]="autorNuevoNombre()"
              (input)="autorNuevoNombre.set($any($event.target).value)"
              class="w-full px-4 py-3 bg-white border border-stone-200 rounded-xl focus:outline-none focus-visible:ring-2 focus-visible:ring-amber-500/40 focus:border-amber-500 shadow-sm transition-all"
              placeholder="Nombre del autor"
            />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-bold text-stone-700 mb-2">Categoria</label>
            <select
              required
              [value]="categoriaId()"
              (change)="categoriaId.set(+$any($event.target).value)"
              class="w-full px-4 py-3 bg-white border border-stone-200 rounded-xl focus:outline-none focus-visible:ring-2 focus-visible:ring-amber-500/40 focus:border-amber-500 shadow-sm transition-all text-stone-700"
            >
              @for (categoria of categorias; track categoria.id) {
                <option [value]="categoria.id">{{ categoria.nombre }}</option>
              }
            </select>
          </div>
          <div>
            <label class="block text-sm font-bold text-stone-700 mb-2">Estado</label>
            <select
              [value]="disponible() ? 'true' : 'false'"
              (change)="disponible.set($any($event.target).value === 'true')"
              class="w-full px-4 py-3 bg-white border border-stone-200 rounded-xl focus:outline-none focus-visible:ring-2 focus-visible:ring-amber-500/40 focus:border-amber-500 shadow-sm transition-all text-stone-700"
            >
              <option value="true">Disponible</option>
              <option value="false">Prestado / No Disponible</option>
            </select>
          </div>
        </div>
      </div>

      <div class="mt-8 pt-6 border-t border-stone-100 flex justify-end gap-3">
        <button
          type="button"
          (click)="cerrar.emit()"
          class="px-6 py-3 text-stone-600 font-bold hover:bg-stone-100 rounded-xl transition-colors"
        >
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="guardando"
          class="flex items-center justify-center gap-2 px-8 py-3 bg-stone-900 text-white rounded-xl font-bold hover:bg-stone-800 transition-colors disabled:opacity-70 shadow-lg shadow-stone-900/20"
        >
          {{ guardando ? 'Guardando...' : 'Guardar Cambios' }}
        </button>
      </div>
    </form>
  </div>
</div>

<div class="fixed inset-0 z-[110] flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-stone-900/50 backdrop-blur-sm transition-opacity" (click)="cerrar.emit()"></div>
  <div
    class="relative w-full max-w-lg bg-white rounded-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200 flex flex-col"
  >
    <div class="px-8 py-6 border-b border-stone-100 flex items-center justify-between shrink-0">
      <h2 class="text-xl font-bold text-stone-900">{{ categoria ? 'Editar Categoria' : 'Nueva Categoria' }}</h2>
      <button
        type="button"
        (click)="cerrar.emit()"
        class="p-2 text-stone-400 hover:text-stone-700 hover:bg-stone-100 rounded-full transition-colors"
        aria-label="Cerrar"
      >
        &times;
      </button>
    </div>

    <form (submit)="alEnviarFormulario($event)" class="p-8 bg-stone-50/30">
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-bold text-stone-700 mb-2">Nombre de Categoria</label>
          <input
            required
            type="text"
            [value]="nombre()"
            (input)="nombre.set($any($event.target).value)"
            class="w-full px-4 py-3 bg-white border border-stone-200 rounded-xl focus:outline-none focus-visible:ring-2 focus-visible:ring-amber-500/40 focus:border-amber-500 shadow-sm transition-all"
            placeholder="Ej. Literatura Clasica"
          />
        </div>
        <div>
          <label class="block text-sm font-bold text-stone-700 mb-2">Descripcion</label>
          <textarea
            required
            rows="3"
            [value]="descripcion()"
            (input)="descripcion.set($any($event.target).value)"
            class="w-full px-4 py-3 bg-white border border-stone-200 rounded-xl focus:outline-none focus-visible:ring-2 focus-visible:ring-amber-500/40 focus:border-amber-500 shadow-sm transition-all resize-none"
            placeholder="Breve descripcion de los libros en esta categoria..."
          ></textarea>
        </div>
      </div>

      <div class="mt-8 pt-6 border-t border-stone-100 flex justify-end gap-3">
        <button
          type="button"
          (click)="cerrar.emit()"
          class="px-6 py-3 text-stone-600 font-bold hover:bg-stone-100 rounded-xl transition-colors"
        >
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="guardando"
          class="flex items-center justify-center gap-2 px-8 py-3 bg-stone-900 text-white rounded-xl font-bold hover:bg-stone-800 transition-colors disabled:opacity-70 shadow-lg shadow-stone-900/20"
        >
          {{ guardando ? 'Guardando...' : 'Guardar' }}
        </button>
      </div>
    </form>
  </div>
</div>

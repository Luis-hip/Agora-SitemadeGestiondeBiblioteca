<div class="min-h-screen bg-stone-50 flex items-center justify-center px-4">
  <form
    (submit)="alEnviarFormulario($event)"
    class="w-full max-w-sm bg-white rounded-3xl shadow-lg border border-stone-100 p-8"
  >
    <h1 class="text-2xl font-bold text-stone-900 mb-1">Iniciar sesion</h1>
    <p class="text-stone-500 text-sm mb-6">Accede con tu correo institucional o credencial de bibliotecario.</p>

    @if (errorInline()) {
      <div class="mb-4 px-3 py-2.5 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm font-medium">
        {{ errorInline() }}
      </div>
    }

    <label class="block text-sm font-bold text-stone-700 mb-1.5">Correo o usuario</label>
    <input
      type="text"
      required
      [value]="identificador()"
      (input)="identificador.set($any($event.target).value)"
      class="w-full px-4 py-2.5 mb-4 bg-white border border-stone-200 rounded-xl text-sm focus:outline-none focus-visible:ring-2 focus-visible:ring-amber-500/40 focus:border-amber-500"
      placeholder="camila@agora.edu"
    />

    <label class="block text-sm font-bold text-stone-700 mb-1.5">Contrasena</label>
    <input
      type="password"
      required
      [value]="password()"
      (input)="password.set($any($event.target).value)"
      class="w-full px-4 py-2.5 mb-6 bg-white border border-stone-200 rounded-xl text-sm focus:outline-none focus-visible:ring-2 focus-visible:ring-amber-500/40 focus:border-amber-500"
      placeholder="********"
    />

    <button
      type="submit"
      [disabled]="enviando()"
      class="w-full bg-stone-900 hover:bg-stone-800 disabled:opacity-60 text-white py-3 rounded-xl font-bold transition-colors"
    >
      {{ enviando() ? 'Ingresando...' : 'Ingresar' }}
    </button>
  </form>
</div>

<nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-stone-100 shadow-sm">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
    <div class="flex items-center gap-6">
      <a routerLink="/" class="font-serif font-bold text-stone-900 text-lg">Agora</a>
      <a
        routerLink="/catalogo"
        routerLinkActive="text-amber-700 border-b-2 border-amber-700"
        class="text-sm font-medium text-stone-600 hover:text-amber-700 transition-colors py-1"
      >
        Catalogo
      </a>
      @if (authService.actor()?.tipoActor === 'USUARIO') {
        <a
          routerLink="/perfil"
          routerLinkActive="text-amber-700 border-b-2 border-amber-700"
          class="text-sm font-medium text-stone-600 hover:text-amber-700 transition-colors py-1"
        >
          Mi Perfil
        </a>
      } @else if (authService.actor()?.tipoActor === 'BIBLIOTECARIO') {
        <a
          routerLink="/admin"
          routerLinkActive="text-amber-700 border-b-2 border-amber-700"
          class="text-sm font-medium text-stone-600 hover:text-amber-700 transition-colors py-1"
        >
          Panel Admin
        </a>
      }
    </div>
    <div class="flex items-center gap-4">
      @if (authService.estaAutenticado()) {
        <app-notification-bell />
        <img [src]="urlAvatarActor()" [alt]="authService.actor()?.nombre" class="w-8 h-8 rounded-full shadow-sm" />
        <span class="text-sm text-stone-500 hidden sm:inline">{{ authService.actor()?.nombre }}</span>
        <button
          type="button"
          (click)="cerrarSesion()"
          class="text-sm font-bold text-stone-600 hover:text-red-600 transition-colors"
        >
          Cerrar Sesion
        </button>
      } @else {
        <a routerLink="/login" class="text-sm font-bold text-stone-600 hover:text-stone-900 transition-colors">
          Iniciar Sesion
        </a>
        <a
          routerLink="/registro"
          class="text-sm font-bold text-white bg-stone-900 hover:bg-stone-800 px-4 py-2 rounded-full transition-colors"
        >
          Registro
        </a>
      }
    </div>
  </div>
</nav>

@if (authService.estaAutenticado()) {
  <nav class="sticky top-0 z-50 bg-white border-b border-stone-100 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <span class="font-bold text-stone-900">Agora</span>
        <a routerLink="/catalogo" class="text-sm font-medium text-stone-600 hover:text-amber-700 transition-colors">
          Catalogo
        </a>
        @if (authService.actor()?.tipoActor === 'USUARIO') {
          <a routerLink="/perfil" class="text-sm font-medium text-stone-600 hover:text-amber-700 transition-colors">
            Mi Perfil
          </a>
        } @else if (authService.actor()?.tipoActor === 'BIBLIOTECARIO') {
          <a routerLink="/admin" class="text-sm font-medium text-stone-600 hover:text-amber-700 transition-colors">
            Panel Admin
          </a>
        }
      </div>
      <div class="flex items-center gap-4">
        <app-notification-bell />
        <span class="text-sm text-stone-500">{{ authService.actor()?.nombre }}</span>
        <button
          type="button"
          (click)="cerrarSesion()"
          class="text-sm font-bold text-stone-600 hover:text-red-600 transition-colors"
        >
          Salir
        </button>
      </div>
    </div>
  </nav>
}

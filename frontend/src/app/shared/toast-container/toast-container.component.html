<div class="fixed top-4 right-4 z-[200] flex flex-col gap-2.5 w-full max-w-sm pointer-events-none">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="pointer-events-auto flex items-start gap-3 rounded-xl border px-4 py-3 shadow-lg animate-in fade-in slide-in-from-top-2 duration-200"
      [class]="clasesPorTipo(toast.tipo)"
    >
      <p class="flex-1 text-sm font-medium">{{ toast.mensaje }}</p>
      <button
        type="button"
        (click)="toastService.cerrar(toast.id)"
        class="shrink-0 text-lg leading-none opacity-60 hover:opacity-100 transition-opacity"
        aria-label="Cerrar notificacion"
      >
        &times;
      </button>
    </div>
  }
</div>

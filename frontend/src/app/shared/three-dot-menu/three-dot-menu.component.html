<div class="relative inline-block">
  <button
    type="button"
    (click)="alternar($event)"
    class="text-stone-400 hover:text-stone-900 p-1.5 rounded-lg transition-colors hover:bg-stone-100"
    aria-label="Mas acciones"
  >
    &#8942;
  </button>

  @if (abierto()) {
    <div
      class="absolute right-0 top-full mt-1 w-40 bg-white rounded-lg shadow-lg border border-stone-100 p-1 z-20 animate-in fade-in zoom-in-95 duration-150"
    >
      @for (accion of acciones; track accion.etiqueta; let i = $index) {
        <button
          type="button"
          (click)="seleccionar(i, $event)"
          class="flex items-center w-full px-3 py-2 text-sm font-medium rounded-md transition-colors"
          [class]="accion.peligro ? 'text-red-600 hover:bg-red-50' : 'text-stone-700 hover:bg-stone-50 hover:text-amber-700'"
        >
          {{ accion.etiqueta }}
        </button>
      }
    </div>
  }
</div>
